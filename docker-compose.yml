services:
  # 1. The Database
  database:
    image: mongo:latest
    container_name: sahayak-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - sahayak-net
    restart: always

  # 2. Python AI Service
  ai-service:
    build: ./ai-service
    container_name: sahayak-ai
    ports:
      - "8001:8001"
    env_file:
      - ./ai-service/.env
    environment:
      - PORT=8001
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./ai-service:/app
    networks:
      - sahayak-net
    healthcheck:
      # This uses Python's built-in library to ping your new /health route
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s # CRITICAL: Gives your AI models time to load before checking
    restart: always

  # 3. Node.js Backend
  backend:
    build: ./backend
    container_name: sahayak-backend
    ports:
      - "5001:5000"
    depends_on:
      ai-service:
        condition: service_healthy # Wait for AI to finish loading models
      database:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/aigrievance
      - PYTHON_AI_SERVICE_URL=http://ai-service:8001
    networks:
      - sahayak-net
    restart: always

  # 4. React Frontend
  frontend:
    build: ./frontend
    container_name: sahayak-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - sahayak-net
    restart: always

networks:
  sahayak-net:
    driver: bridge

volumes:
  mongo-data:

